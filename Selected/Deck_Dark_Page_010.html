<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Dark Page 010</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .slide-container {
            display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2.5vmin;
        }

        .title-card {
            grid-row: span 2;
            border: 1px solid var(--color-text);
            border-radius: var(--radius-lg);
            padding: var(--space-9);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        h1 {
            font-size: var(--text-display);
            margin: 0;
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        .light { font-weight: var(--weight-light); }
        .bold { font-weight: var(--weight-medium); }

        .top-right-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5vmin;
        }

        .card-green {
            border-radius: var(--radius-lg);
        }

        .card-white {
            border-radius: var(--radius-lg);
        }

        .bottom-right-card {
            background-color: var(--color-purple);
            border-radius: var(--radius-lg);
            padding: var(--space-9);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: var(--space-2);
        }

        .info-text {
            font-size: var(--text-h4);
            font-weight: var(--weight-regular);
            margin: 0;
            color: rgba(255,255,255,0.85);
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <!-- Left Side -->
        <div class="title-card">
            <h1>
                <span class="light">The</span><br>
                <span class="bold">Workshop</span><br>
                <span class="bold">Opening</span><br>
                <span class="light">slide</span>
            </h1>
        </div>

        <!-- Top Right -->
        <div class="top-right-row">
            <div class="card-green" data-image-placeholder="photo"></div>
            <div class="card-white" data-image-placeholder="photo"></div>
        </div>

        <!-- Bottom Right -->
        <div class="bottom-right-card">
            <p class="info-text">Department Name</p>
            <p class="info-text">Date</p>
        </div>
    </div>

<script src="entrance-animations.js"></script>
</body>
</html>
