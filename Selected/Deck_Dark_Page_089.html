<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Chart Vertical Rows</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .slide-container {
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: var(--text-h2);
            font-weight: var(--weight-regular);
            line-height: 1.2;
            margin: 0 0 6vh 0;
        }

        .table-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 3vh;
        }
        
        .data-rows-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 3vh;
        }

        .table-row {
            display: grid;
            grid-template-columns: 2.5fr 1.2fr 1.2fr 1.2fr 1.2fr 1.2fr 1.2fr;
            align-items: center;
            width: 100%;
            font-size: var(--text-h4);
        }

        .header-row {
            font-weight: var(--weight-regular);
            color: var(--color-text);
        }

        .header-row .cell {
            white-space: nowrap;
        }

        .data-row {
            padding: 2.5vh 0;
            animation: chartFadeUp 0.5s ease-out both;
        }

        .data-rows-wrapper .data-row:nth-child(odd) {
            background-color: var(--color-surface);
        }

        .data-rows-wrapper .data-row:nth-child(2) { animation-delay: 0.1s; }
        .data-rows-wrapper .data-row:nth-child(3) { animation-delay: 0.2s; }
        .data-rows-wrapper .data-row:nth-child(4) { animation-delay: 0.3s; }

        .cell {
            text-align: left;
            padding-left: 2.5vw;
            font-weight: var(--weight-regular);
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <h1>Table chart vertical rows – Add your title here</h1>
        <div class="table-container">
            <div class="table-row header-row">
                <div class="cell"></div> <!-- Empty cell for the first column header -->
                <div class="cell">Add your title</div>
                <div class="cell">Add your title</div>
                <div class="cell">Add your title</div>
                <div class="cell">Add your title</div>
                <div class="cell">Add your title</div>
                <div class="cell">Add your title</div>
            </div>
            <div class="data-rows-wrapper">
                <div class="table-row data-row">
                    <div class="cell">Lorem ipsum</div>
                    <div class="cell">45</div>
                    <div class="cell">-630</div>
                    <div class="cell">10</div>
                    <div class="cell">35%</div>
                    <div class="cell">4000%</div>
                    <div class="cell">100%</div>
                </div>
                <div class="table-row data-row">
                    <div class="cell">Lorem ipsum</div>
                    <div class="cell">35</div>
                    <div class="cell">235%</div>
                    <div class="cell">9</div>
                    <div class="cell">10/50</div>
                    <div class="cell">234</div>
                    <div class="cell">55.68</div>
                </div>
                <div class="table-row data-row">
                    <div class="cell">Lorem ipsum</div>
                    <div class="cell">68</div>
                    <div class="cell">+730%</div>
                    <div class="cell">3</div>
                    <div class="cell">579</div>
                    <div class="cell">678</div>
                    <div class="cell">357</div>
                </div>
                <div class="table-row data-row">
                    <div class="cell">Lorem ipsum</div>
                    <div class="cell">90</div>
                    <div class="cell">250</div>
                    <div class="cell">7</div>
                    <div class="cell">$542,790</div>
                    <div class="cell">168,753</div>
                    <div class="cell">40%</div>
                </div>
            </div>
        </div>
    </div>
<script src="entrance-animations.js"></script>
</body>
</html>
