<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Dark Page 015</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .slide-container {
            display: grid;
            grid-template-columns: 0.8fr 1.2fr;
            align-items: center;
            gap: var(--space-7);
        }

        h1 {
            font-size: var(--text-display);
            font-weight: var(--weight-light);
            margin: 0;
            letter-spacing: -0.015em;
        }

        .cards-column {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
            height: 100%;
            justify-content: center;
        }

        .chapter-card {
            background-color: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: var(--space-8) var(--space-9);
            display: flex;
            align-items: center;
            gap: var(--space-7);
            height: 22vmin;
            box-sizing: border-box;
        }

        .number-circle {
            width: 7vmin;
            height: 7vmin;
            background-color: var(--color-purple);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: var(--text-h4);
            font-weight: var(--weight-regular);
            flex-shrink: 0;
        }

        .chapter-text {
            font-size: var(--text-h3);
            font-weight: var(--weight-regular);
        }

        .chapter-text span {
            font-weight: var(--weight-light);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <h1>Agenda</h1>

        <div class="cards-column">
            <div class="chapter-card">
                <div class="number-circle">1</div>
                <div class="chapter-text">Chapter A - <span>Opening slides</span></div>
            </div>
            <div class="chapter-card">
                <div class="number-circle">2</div>
                <div class="chapter-text">Chapter B - <span>Speakers</span></div>
            </div>
            <div class="chapter-card">
                <div class="number-circle">3</div>
                <div class="chapter-text">Chapter C - <span>Text slides</span></div>
            </div>
        </div>
    </div>

<script src="entrance-animations.js"></script>
</body>
</html>
