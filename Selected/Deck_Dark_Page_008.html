    <title>Deck Dark Page 008</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .slide-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-wrapper {
            background-color: var(--color-surface);
            border-radius: var(--radius-xl);
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .deco-circle-left,
        .deco-circle-right {
            position: absolute;
            width: 28vmin;
            height: 28vmin;
            border-radius: 50%;
            background-color: var(--color-purple);
            top: 50%;
            transform: translateY(-50%);
        }

        .deco-circle-left {
            left: -20vmin;
        }

        .deco-circle-right {
            right: -20vmin;
        }

        .content-center {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-5);
        }

        h1 {
            font-size: var(--text-h1);
            font-weight: var(--weight-semibold);
            margin: 0;
            line-height: 1.15;
            letter-spacing: -0.03em;
            color: var(--color-text);
        }

        p {
            font-size: var(--text-h4);
            font-weight: var(--weight-light);
            margin: 0;
            line-height: 1.5;
            color: var(--color-text);
            opacity: 0.8;
        }

        .logo-container {
            position: absolute;
            bottom: var(--space-8);
            z-index: 2;
            display: flex;
            justify-content: center;
        }

        .monday-logo {
            height: 4vmin;
            width: auto;
        }
    </style>
</head>
