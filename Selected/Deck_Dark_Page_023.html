<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Dark Page 023</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .slide-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            align-items: center;
        }

        .content-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: var(--space-2);
            margin-top: -8vmin;
            z-index: 2;
        }

        .intro-text {
            font-size: var(--text-h2);
            font-weight: var(--weight-light);
            margin: 0;
        }

        .name-text {
            font-size: 15vmin;
            font-weight: var(--weight-semibold);
            margin: 0;
            line-height: 0.95;
            letter-spacing: -0.05em;
        }

        .bio-text {
            font-size: var(--text-h4);
            font-weight: var(--weight-light);
            margin-top: var(--space-6);
            max-width: 85%;
            line-height: 1.4;
            opacity: 0.9;
        }

        .profile-section {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: relative;
        }

        .profile-circle {
            width: 72vmin;
            height: 72vmin;
            border-radius: 50%;
            border: 1px solid var(--color-text);
            overflow: hidden;
            box-shadow: 0 0 10vmin rgba(0,0,0,0.5);
        }

        .logo-container {
            position: absolute;
            bottom: var(--space-8);
            left: 50%;
            transform: translateX(-50%);
        }

        .monday-logo {
            height: 4vmin;
            width: auto;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <div class="content-left">
            <p class="intro-text">Hi, I'm</p>
            <h1 class="name-text">Jane Smith</h1>
            <p class="bio-text">
                Here you can write something about your role, work experience or skills, or just a fun fact
            </p>
        </div>

        <div class="profile-section">
            <div class="profile-circle" data-image-placeholder="portrait"></div>
        </div>

        <div class="logo-container">
            <img src="monday_logo.svg" alt="monday.com" class="monday-logo">
        </div>
    </div>

<script src="entrance-animations.js"></script>
</body>
</html>
