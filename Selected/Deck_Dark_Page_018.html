<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Dark Page 018</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .slide-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .oval-container {
            width: 75%;
            height: 62%;
            border: 1px solid var(--color-text);
            border-radius: 999px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: var(--text-h1);
            font-weight: var(--weight-light);
            margin: 0;
            letter-spacing: 0.025em;
        }

        .logo-container {
            position: absolute;
            bottom: var(--space-8);
            display: flex;
            justify-content: center;
        }

        .monday-logo {
            height: 4vmin;
            width: auto;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <div class="oval-container">
            <h1>Dividers</h1>
        </div>

        <div class="logo-container">
            <img src="monday_logo.svg" alt="monday.com" class="monday-logo">
        </div>
    </div>

<script src="entrance-animations.js"></script>
</body>
</html>
