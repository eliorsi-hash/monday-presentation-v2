<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Dark Page 021</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .slide-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: var(--text-h1);
            font-weight: var(--weight-regular);
            margin: 0 0 var(--space-5) 0;
            letter-spacing: -0.02em;
        }

        p {
            font-size: var(--text-h3);
            font-weight: var(--weight-light);
            line-height: 1.5;
            max-width: 80%;
            margin: 0;
            opacity: 0.9;
        }

        .logo-container {
            position: absolute;
            bottom: var(--space-8);
            display: flex;
            justify-content: center;
        }

        .monday-logo {
            height: 4vmin;
            width: auto;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <h1>Add your title here</h1>
        <p>
            Lorem ipsum dolor sit amet consectetur,<br>
            Mi quis hendrerit dolor magna eget est.
        </p>

        <div class="logo-container">
            <img src="monday_logo.svg" alt="monday.com" class="monday-logo">
        </div>
    </div>

<script src="entrance-animations.js"></script>
</body>
</html>
