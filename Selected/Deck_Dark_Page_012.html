<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Dark Page 012</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        .slide-container {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .top-card {
            background-color: var(--color-bg);
            border: 1px solid var(--color-text);
            border-radius: var(--radius-xl);
            flex: 1.6;
            padding: var(--space-9) var(--space-10);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        .logo-top {
            height: 4vmin;
            margin-bottom: var(--space-8);
            align-self: flex-start;
        }

        h1 {
            font-size: var(--text-display);
            margin: 0;
            line-height: 1.05;
            letter-spacing: -0.025em;
            word-spacing: -0.1em;
        }

        .light { font-weight: var(--weight-light); }
        .regular { font-weight: var(--weight-regular); }

        .bottom-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-3);
            flex: 1;
        }

        .speaker-group {
            display: flex;
            gap: var(--space-1);
            align-items: center;
        }

        .profile-placeholder {
            width: 22vmin;
            height: 22vmin;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .info-card {
            background-color: var(--color-purple);
            border-radius: var(--radius-lg);
            flex: 1;
            height: 100%;
            padding: var(--space-8) var(--space-9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.2vmin;
            box-sizing: border-box;
        }

        .info-card h2 {
            font-size: var(--text-h3);
            font-weight: var(--weight-semibold);
            margin: 0;
        }

        .info-card p {
            font-size: var(--text-h4);
            font-weight: var(--weight-light);
            margin: 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <div class="top-card">
            <img src="monday_logo.svg" alt="monday.com" class="logo-top">
            <h1>
                <span class="light">The</span> <span class="regular">speaker's</span><br>
                <span class="regular">opening</span> <span class="light">slide.</span>
            </h1>
        </div>

        <div class="bottom-section">
            <div class="speaker-group">
                <div class="profile-placeholder" data-image-placeholder="portrait"></div>
                <div class="info-card">
                    <h2>Jane Smith</h2>
                    <p>Add your Job Title</p>
                </div>
            </div>
            <div class="speaker-group">
                <div class="profile-placeholder" data-image-placeholder="portrait"></div>
                <div class="info-card">
                    <h2>John Smith</h2>
                    <p>Add your Job Title</p>
                </div>
            </div>
        </div>
    </div>

<script src="entrance-animations.js"></script>
</body>
</html>
